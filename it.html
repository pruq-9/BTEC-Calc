<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>حاسبة معدل IT</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <a class="floating-home-link" href="index.html" aria-label="الرجوع للصفحة الرئيسية" title="الصفحة الرئيسية">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
        <path d="M3 10.8 12 3l9 7.8" />
        <path d="M5 10v10h14V10" />
        <path d="M9 20v-6h6v6" />
      </svg>
    </a>
    <main class="app-shell">
      <section class="calculator" aria-labelledby="page-title">
        <div class="header">
          <div>
            <p class="eyebrow">حاسبة المعدل</p>
            <h1 id="page-title">حاسبة معدل تكنولوجيا المعلومات</h1>
          </div>
          <div class="header-actions">
            <div class="total-badge">
              <span id="total-score-label">المجموع</span>
              <strong id="total-score">0 / 35</strong>
            </div>
          </div>
        </div>

        <form id="grades-form">
          <fieldset class="subject-count">
            <legend>الصف</legend>
            <label>
              <input type="radio" name="subject-count" value="10" />
              <span>عاشر</span>
            </label>
            <label>
              <input type="radio" name="subject-count" value="11" />
              <span>اول ثانوي</span>
            </label>
            <label>
              <input type="radio" name="subject-count" value="12" checked />
              <span>ثاني ثانوي</span>
            </label>
            <label>
              <input type="radio" name="subject-count" value="secondary-combined" />
              <span>أول وثانوي معًا</span>
            </label>
          </fieldset>

          <fieldset class="subject-count score-scale" id="tenth-grade-scale" hidden>
            <legend>حساب معدل عاشر</legend>
            <label>
              <input type="radio" name="score-scale" value="70" checked />
              <span>من 70%</span>
            </label>
            <label>
              <input type="radio" name="score-scale" value="100" />
              <span>من 100%</span>
            </label>
          </fieldset>

          <div id="subjects-list" class="subjects-list"></div>
          <div class="reset-row">
            <button class="reset-button" type="button" id="reset-grades">إعادة التعيين</button>
          </div>
        </form>

        <section class="summary" aria-live="polite">
          <div>
            <span>إجمالي الساعات</span>
            <strong id="total-hours">0</strong>
          </div>
          <div>
            <span id="average-score-label">المعدل من 35</span>
            <strong id="average-score">0.00</strong>
          </div>
        </section>
      </section>

      <footer class="site-footer">
        <strong>ابراهيم الصعيدي</strong>
        <span>Ibrahim Al Saidi</span>
      </footer>
    </main>

    <template id="subject-template">
      <article class="subject-row">
        <div class="field subject-name">
          <label>اسم المادة</label>
          <input type="text" name="subject-name" placeholder="مثال: الرياضيات" />
        </div>
        <div class="field">
          <label>عدد الساعات</label>
          <select name="subject-hours">
            <option value="60">60 ساعة</option>
            <option value="90">90 ساعة</option>
            <option value="120">120 ساعة</option>
          </select>
        </div>
        <div class="quick-fill" aria-label="اختيار علامة لجميع أهداف المادة">
          <span>تعبئة سريعة</span>
          <div class="quick-fill-buttons">
            <button type="button" data-fill-grade="D">D</button>
            <button type="button" data-fill-grade="M">M</button>
            <button type="button" data-fill-grade="P">P</button>
          </div>
        </div>
        <div class="learning-goals" data-learning-goals></div>
        <div class="subject-result">
          <span>النقاط الموزونة</span>
          <output class="subject-points" name="subject-points">0.00</output>
        </div>
      </article>
    </template>

    <script src="script.js"></script>
  </body>
</html>
